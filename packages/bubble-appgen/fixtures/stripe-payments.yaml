                    type: integer
                    format: unix-time
                    nullable: true
                    description: Populated when `status` is `canceled`, this is the time at which the PaymentIntent was canceled. Measured in seconds since the Unix epoch.
                  cancellation_reason:
                    type: string
                    enum:
                      - abandoned
