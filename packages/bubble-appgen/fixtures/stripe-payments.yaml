                      terms_of_service_acceptance:
                        anyOf:
                          - type: object
                            description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                        description: Custom text that should be displayed in place of the default terms of service agreement text.
                  customer_creation:
                    type: string
                    enum:
                      - always
                      - if_required
                    description: Configuration for Customer creation during checkout.
                  id:
                    type: string
                    maxLength: 5000
                    description: Unique identifier for the object.
                  inactive_message:
                    type: string
                    nullable: true
                    maxLength: 5000
                    description: The custom message to be displayed to a customer when a payment link is no longer active.
                  invoice_creation:
                    anyOf:
                      - type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
