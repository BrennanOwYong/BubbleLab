                    nullable: true
                    maxLength: 5000
                    description: The client secret of this PaymentIntent. Used for client-side retrieval using a publishable key. The client secret can be used to complete a payment from your frontend. It should not be stored, logge…
                  confirmation_method:
                    type: string
                    enum:
