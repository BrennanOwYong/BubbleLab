                      - requested_by_customer
                      - void_invoice
                    nullable: true
                    description: Reason for cancellation of this PaymentIntent, either user-provided (`duplicate`, `fraudulent`, `requested_by_customer`, or `abandoned`) or generated by Stripe internally (`failed_invoice`, `void_inv…
                  capture_method:
                    type: string
                    enum:
                      - automatic
