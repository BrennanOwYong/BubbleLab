                        description: This object represents a customer of your business. Use it to [create recurring charges](https://docs.stripe.com/invoicing/customer), [save payment](https://docs.stripe.com/payments/save-during-payme… (nested object collapsed at trim depth limit)
                      - type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                    description: ID of the Customer this PaymentIntent belongs to, if one exists. Payment methods attached to other Customers cannot be used with this PaymentIntent. If [setup_future_usage](https://api.stripe.com#pay…
