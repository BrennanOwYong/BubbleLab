                      - object
                      - url
                  livemode:
                    type: boolean
                    description: If the object exists in live mode, the value is `true`. If the object exists in test mode, the value is `false`.
                  managed_payments:
                    anyOf:
                      - type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                    description: Settings for Managed Payments for this Payment Link and resulting [CheckoutSessions](/api/checkout/sessions/object), [PaymentIntents](/api/payment_intents/object), [Invoices](/api/invoices/object), a…
                  metadata:
                    type: object
                    description: Set of [key-value pairs](https://docs.stripe.com/api/metadata) that you can attach to an object. This can be useful for storing additional information about the object in a structured format.
                    additionalProperties:
                      type: string
                      maxLength: 500
                  name_collection:
                    type: object
                    properties:
                      business:
