  /v1/payment_links:
    post:
      operationId: CreatePaymentLink
      summary: Create a payment link
      description: <p>Creates a payment link.</p>
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                line_items:
                  type: array
                  description: The line items representing what is being sold. Each line item represents an item being sold. Up to 20 line items are supported.
                  items:
                    type: object
                    properties:
                      adjustable_quantity:
                        type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                      price:
                        type: string
                        maxLength: 5000
                      price_data:
                        type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                      quantity:
                        type: integer
                    required:
                      - quantity
                currency:
                  type: string
                  format: currency
                  description: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Must be a [supported currency](https://stripe.com/docs/currencies) and supported by each line item's …
                allow_promotion_codes:
                  type: boolean
                  description: Enables user redeemable promotion codes.
                after_completion:
                  type: object
                  description: Behavior after the purchase is complete.
                  properties:
                    hosted_confirmation:
                      type: object
                      description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                    redirect:
                      type: object
                      description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                    type:
                      type: string
                      enum:
                        - hosted_confirmation
                        - redirect
                  required:
                    - type
                metadata:
                  type: object
                  description: Set of [key-value pairs](https://docs.stripe.com/api/metadata) that you can attach to an object. This can be useful for storing additional information about the object in a structured format. Individ…
                  additionalProperties:
                    type: string
              required:
                - line_items
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                description: A payment link is a shareable URL that will take your customers to a hosted payment page. A payment link can be shared and used multiple times. When a customer opens a payment link it will open a new…
                properties:
                  active:
                    type: boolean
                    description: Whether the payment link's `url` is active. If `false`, customers visiting the URL will be shown a page saying that the link has been deactivated.
                  after_completion:
                    type: object
                    properties:
                      hosted_confirmation:
                        type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                      redirect:
                        type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                      type:
                        type: string
                        enum:
                          - hosted_confirmation
                          - redirect
                        description: The specified behavior after the purchase is complete.
                    required:
                      - type
                  allow_promotion_codes:
                    type: boolean
                    description: Whether user redeemable promotion codes are enabled.
                  application:
                    anyOf:
                      - type: string
                        maxLength: 5000
                      - type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                      - type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                    description: The ID of the Connect application that created the Payment Link.
                  application_fee_amount:
                    type: integer
                    nullable: true
                    description: The amount of the application fee (if any) that will be requested to be applied to the payment and transferred to the application owner's Stripe account.
                  application_fee_percent:
                    type: number
                    nullable: true
                    description: This represents the percentage of the subscription invoice total that will be transferred to the application owner's Stripe account.
                  automatic_tax:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        description: If `true`, tax will be calculated automatically using the customer's location.
                      liability:
                        anyOf:
                          - type: object
                            description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                        description: The account that's liable for tax. If set, the business address and tax registrations required to perform the tax calculation are loaded from this account. The tax transaction is returned in the repo…
                    required:
                      - enabled
                  billing_address_collection:
                    type: string
                    enum:
                      - auto
                      - required
                    description: Configuration for collecting the customer's billing address. Defaults to `auto`.
                  consent_collection:
                    anyOf:
                      - type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                    description: When set, provides configuration to gather active consent from customers.
                  currency:
                    type: string
                    format: currency
                    description: Three-letter [ISO currency code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase. Must be a [supported currency](https://stripe.com/docs/currencies).
                  custom_fields:
                    type: array
                    description: Collect additional information from your customer using custom fields. Up to 3 fields are supported. You can't set this parameter if `ui_mode` is `custom`.
                    items:
                      type: object
                      properties:
                        dropdown:
                          type: object
                          description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                        key:
                          type: string
                          maxLength: 5000
                          description: String of your choice that your integration can use to reconcile this field. Must be unique to this field, alphanumeric, and up to 200 characters.
                        label:
