openapi: 3.0.0
info:
  title: 'Stripe API (payments, payouts, refunds, charges, balance subset)'
  version: 2026-06-24.dahlia
  description: Request bodies are application/x-www-form-urlencoded with deepObject bracket encoding per https://docs.stripe.com/api/requests. Trimmed subset of https://raw.githubusercontent.com/stripe/openapi/master/openapi/spec3.json (source version 2026-06-24.dahlia); regenerate with scripts/trim-openapi.ts.
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
paths:
  /v1/payment_intents:
