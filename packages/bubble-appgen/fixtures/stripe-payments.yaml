                      order_reference:
                        type: string
                        nullable: true
                        maxLength: 5000
                        description: A unique value assigned by the business to identify the transaction. Required for L2 and L3 rates. For Cards, this field is truncated to 25 alphanumeric characters, excluding spaces, before being sen…
                  payment_method:
                    anyOf:
                      - type: string
                        maxLength: 5000
                      - type: object
                        description: PaymentMethod objects represent your customer's payment instruments. You can use them with [PaymentIntents](https://docs.stripe.com/payments/payment-intents) to collect payments or save them to Custo… (nested object collapsed at trim depth limit)
                    description: ID of the payment method used in this PaymentIntent.
