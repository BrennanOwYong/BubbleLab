                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                      individual:
                        type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                  object:
                    type: string
                    enum:
                      - payment_link
                    description: String representing the object's type. Objects of the same type share the same value.
                  on_behalf_of:
                    anyOf:
                      - type: string
                        maxLength: 5000
