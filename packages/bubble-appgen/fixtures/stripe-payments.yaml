                  type: string
                  maxLength: 5000
                  description: ID of the Customer this PaymentIntent belongs to, if one exists. Payment methods attached to other Customers cannot be used with this PaymentIntent. If [setup_future_usage](https://api.stripe.com#pay…
                description:
                  type: string
                  maxLength: 1000
                  description: An arbitrary string attached to the object. Often useful for displaying to users.
                metadata:
                  type: object
                  description: Set of [key-value pairs](https://docs.stripe.com/api/metadata) that you can attach to an object. This can be useful for storing additional information about the object in a structured format. Individ…
                  additionalProperties:
                    type: string
                payment_method:
                  type: string
                  maxLength: 5000
                  description: ID of the payment method (a PaymentMethod, Card, or [compatible Source](https://docs.stripe.com/payments/payment-methods/transitioning#compatibility) object) to attach to this PaymentIntent. If you o…
                receipt_email:
                  type: string
                  description: Email address to send the receipt to. If you specify `receipt_email` for a payment in live mode, you send a receipt regardless of your [email settings](https://dashboard.stripe.com/account/emails).
                statement_descriptor:
                  type: string
                  maxLength: 22
                  description: Text that appears on the customer's statement as the statement descriptor for a non-card charge. This value overrides the account's default statement descriptor. For information about requirements, i…
              required:
                - amount
                - currency
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                description: A PaymentIntent guides you through the process of collecting a payment from your customer. We recommend that you create exactly one PaymentIntent for each order or customer session in your system. Yo…
                properties:
                  amount:
                    type: integer
                    description: Amount intended to be collected by this PaymentIntent. A positive integer representing how much to charge in the [smallest currency unit](https://docs.stripe.com/currencies#zero-decimal) (e.g., 100 c…
                  amount_capturable:
                    type: integer
                    description: Amount that can be captured from this PaymentIntent.
                  amount_details:
                    anyOf:
                      - type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                      - type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                  amount_received:
                    type: integer
                    description: Amount that this PaymentIntent collects.
                  application:
                    anyOf:
                      - type: string
                        maxLength: 5000
                      - type: object
                        description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                    description: ID of the Connect application that created the PaymentIntent.
                  application_fee_amount:
                    type: integer
                    nullable: true
                    description: The amount of the application fee (if any) that will be requested to be applied to the payment and transferred to the application owner's Stripe account. The amount of the application fee collected w…
