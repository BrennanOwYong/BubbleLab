                        text:
                          type: object
                          description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
                        type:
                          type: string
                          enum:
                            - dropdown
                            - numeric
                            - text
                          description: The type of the field.
                      required:
                        - key
                        - label
                        - optional
                        - type
                  custom_text:
                    type: object
                    properties:
                      after_submit:
                        anyOf:
                          - type: object
                            description: Vendor object (nested object collapsed at trim depth limit); see the vendor API reference for its fields.
